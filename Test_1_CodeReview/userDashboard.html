<div ng-controller="UserDashboardController">
  <input
    ng-model="searchQuery"
    ng-change="onSearch()"
    placeholder="Search users..."
  />
  <div ng-if="error" style="color: red;">{{ error }}</div>
  <div ng-repeat="user in filteredUsers track by user.id">
    <h3>{{ user.name }}</h3>
    <p>{{ user.email }}</p>
    <button ng-click="makeAdmin(user)">Make Admin</button>
  </div>
  <div ng-if="filteredUsers.length == 0">No users found</div>
</div>
